<!DOCTYPE html>
<html>
<head>
  <title>FAQ Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 30px 40px;
      max-width: 500px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      text-align: center;
    }
    h2 {
      margin-bottom: 20px;
      color: #333;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 15px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.3s ease;
    }
    input[type="text"]:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 8px rgba(74,144,226,0.5);
    }
    button {
      margin-top: 15px;
      padding: 12px 25px;
      font-size: 16px;
      background-color: #4a90e2;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #357abd;
    }
    #response {
      margin-top: 25px;
      background: #f7f9fc;
      padding: 20px;
      border-radius: 10px;
      font-size: 16px;
      color: #222;
      min-height: 70px;
      text-align: left;
      white-space: pre-wrap;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
    }
    #response strong {
      color: #4a90e2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Ask a Question</h2>
    <input type="text" id="questionInput" placeholder="e.g., What are the office hours?" />
    <button onclick="askQuestion()">Ask</button>
    <div id="response"></div>
  </div>

  <script>
    async function askQuestion() {
      const question = document.getElementById('questionInput').value.trim();
      const responseDiv = document.getElementById('response');

      if (!question) {
        responseDiv.innerHTML = '<strong>Bot:</strong> Please enter a question.';
        return;
      }

      responseDiv.innerHTML = '<strong>Bot:</strong> Thinking...';

      try {
        const res = await fetch("https://your-n8n-instance-url/webhook/faq-bot", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: question })
        });

        if (!res.ok) {
          responseDiv.innerHTML = `<strong>Bot:</strong> Sorry, something went wrong. Please try again.`;
          return;
        }

        const data = await res.text();
        responseDiv.innerHTML = `<strong>Bot:</strong> ${data}`;
      } catch (error) {
        responseDiv.innerHTML = `<strong>Bot:</strong> Network error, please try again later.`;
      }
    }
  </script>
</body>
</html>
